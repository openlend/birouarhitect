version: '3.8'

services:
  birouarhitect-dev:
    image: node:22-alpine
    container_name: birouarhitect-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules  # Prevent overwriting node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev"
    environment:
      - NODE_ENV=development
    stdin_open: true
    tty: true
